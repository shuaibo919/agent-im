<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent IM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='4' width='26' height='20' rx='5' fill='%2300e5a0'/%3E%3Cpolygon points='10,24 16,24 10,30' fill='%2300e5a0'/%3E%3Crect x='11' y='11' width='2.5' height='6' rx='1.25' fill='%230a0a0f'/%3E%3Crect x='18.5' y='11' width='2.5' height='6' rx='1.25' fill='%230a0a0f'/%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0a0a0f',
            panel: '#111118',
            border: '#1e1e2e',
            accent: '#00e5a0',
            'accent-hover': '#00cc8e',
            muted: '#6b7280',
            'text-primary': '#e5e7eb',
            'text-secondary': '#9ca3af',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0a0a0f; color: #e5e7eb; font-family: 'Inter', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji', sans-serif; margin: 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2e2e3e; }
    .msg-card { position: relative; }
    .msg-card .msg-content { max-height: calc(1.5em * 10); overflow: hidden; }
    .msg-card.expanded .msg-content { max-height: none; }
    .msg-card .msg-expand { display: flex; }
    .msg-card.expanded .msg-expand svg { transform: rotate(180deg); }
    .msg-card.no-overflow .msg-expand { display: none; }
    .msg-content img { max-width: 320px; max-height: 256px; border-radius: 8px; border: 1px solid #1e1e2e; margin: 4px 0; cursor: pointer; display: block; }
    .msg-content a { color: #00e5a0; text-decoration: underline; text-underline-offset: 2px; }
    .msg-content a:hover { color: #00cc8e; }
    .msg-content p { margin: 0.25em 0; }
    .msg-content p:first-child { margin-top: 0; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content ul, .msg-content ol { margin: 0.25em 0; padding-left: 1.5em; }
    .msg-content li { margin: 0.15em 0; }
    .msg-content h1, .msg-content h2, .msg-content h3 { margin: 0.5em 0 0.25em; font-weight: 600; }
    .msg-content h1 { font-size: 1.15em; }
    .msg-content h2 { font-size: 1.05em; }
    .msg-content h3 { font-size: 1em; }
    .msg-content pre { background: #0d0d14; border: 1px solid #1e1e2e; border-radius: 6px; padding: 0.5em 0.75em; overflow-x: auto; margin: 0.4em 0; font-size: 0.85em; }
    .msg-content code { background: #1a1a2e; padding: 0.15em 0.35em; border-radius: 3px; font-size: 0.9em; font-family: 'IBM Plex Mono', monospace; }
    .msg-content pre code { background: none; padding: 0; border-radius: 0; font-size: inherit; }
    .msg-content blockquote { border-left: 3px solid #00e5a0; margin: 0.4em 0; padding: 0.25em 0.75em; color: #9ca3af; }
    .msg-content hr { border: none; border-top: 1px solid #1e1e2e; margin: 0.5em 0; }
    .msg-content strong { font-weight: 600; }
    .msg-content table { border-collapse: collapse; margin: 0.4em 0; font-size: 0.9em; }
    .msg-content th, .msg-content td { border: 1px solid #1e1e2e; padding: 0.3em 0.6em; }
    .msg-content th { background: #0d0d14; font-weight: 600; }
    #image-preview-bar img { max-height: 48px; border-radius: 4px; }
  </style>
</head>
<body class="h-screen overflow-hidden">

  <!-- Main Layout: 3 columns -->

    <!-- Left Panel (sidebar) -->

        <button id="tab-profiles" onclick="switchTab('profiles')" class="flex-1 py-3 text-xs font-medium text-center transition-colors text-muted hover:text-text-secondary border-t-2 border-transparent -mt-px flex flex-col items-center gap-1">

<script>
// --- State ---
let currentTab = 'threads'
let currentThreadId = null
const expandedMsgIds = new Set()
let pollingInterval = null
let allProfiles = []
let selectedParticipants = [] // [{id, role}]
let cachedThreads = []
let cachedMessages = [] // for reply lookup
let replyToMsg = null // message object being replied to
let detailPanelVisible = false
const SENDER_COLORS = ['#f97316','#a855f7','#3b82f6','#ec4899','#10b981','#eab308','#06b6d4','#f43f5e']
const TAB_ACTIVE = 'flex-1 py-3 text-xs font-medium text-center transition-colors text-accent border-t-2 border-accent -mt-px flex flex-col items-center gap-1'
const TAB_INACTIVE = 'flex-1 py-3 text-xs font-medium text-center transition-colors text-muted hover:text-text-secondary border-t-2 border-transparent -mt-px flex flex-col items-center gap-1'

// --- Utils ---
function senderColor(name) {
  let hash = 0
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) | 0
  return SENDER_COLORS[Math.abs(hash) % SENDER_COLORS.length]
}

async function api(method, path, body) {
  const opts = { method, headers: body ? { 'Content-Type': 'application/json' } : {} }
  if (body) opts.body = JSON.stringify(body)
  const res = await fetch(path, opts)
  if (res.status === 401) { window.location.href = '/chat'; throw new Error('Unauthorized') }
  return res.json()
}

function timeAgo(iso) {
  if (!iso) return ''
  const ts = iso.endsWith('Z') || iso.includes('+') ? iso : iso + 'Z'
  const diff = Date.now() - new Date(ts).getTime()
  const m = Math.floor(diff / 60000)
  if (m < 1) return 'just now'
  if (m < 60) return m + 'm ago'
  const h = Math.floor(m / 60)
  if (h < 24) return h + 'h ago'
  return Math.floor(h / 24) + 'd ago'
}

function escapeHtml(str) {
  const div = document.createElement('div')
  div.textContent = str
  return div.innerHTML
}

/** Render message content — parse markdown via marked, with image/link support */
function renderContent(raw) {
  // Step 1: Extract ALL markdown images BEFORE parsing (data URIs are too large for marked; regular images need click handling)
  const imagePlaceholders = []
  let processed = raw.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, url) => {
    const token = `IMGPLACEHOLDER${imagePlaceholders.length}ENDPLACEHOLDER`
    imagePlaceholders.push({ alt, url })
    return token
  })

  // Step 2: parse markdown → HTML via marked (handles bold, italic, code, lists, headers, etc.)
  let s = marked.parse(processed, { breaks: true, gfm: true })

  // Step 3: restore image placeholders as <img> tags
  for (let i = 0; i < imagePlaceholders.length; i++) {
    const { alt, url } = imagePlaceholders[i]
    const safeAlt = escapeHtml(alt)
    const imgTag = `<img src="${url}" alt="${safeAlt}" class="max-w-full rounded-lg my-2 cursor-pointer" loading="lazy" onclick="window.open(this.src,'_blank')" />`
    s = s.replaceAll(`IMGPLACEHOLDER${i}ENDPLACEHOLDER`, imgTag)
  }

  // Step 4: make all links open in new tab
  s = s.replace(/<a /g, '<a target="_blank" rel="noopener" ')
  return s
}

/** Summarize content for reply previews — replace images with [Image] */
function summarizeContent(raw, maxLen) {
  let s = raw.replace(/!\[[^\]]*\]\(data:image\/[^)]+\)/g, '[Image]')
  s = s.replace(/!\[[^\]]*\]\(https?:\/\/[^)]+\)/g, '[Image]')
  return s.slice(0, maxLen || 80)
}

/** Get display name for an id — falls back to id itself */
function displayName(id) {
  const prof = allProfiles.find(p => p.id === id)
  return prof && prof.display_name ? prof.display_name : id
}

/** Parse participants JSON — compatible with ["a"] and [{"id":"a","role":"x"}] */
function parseParticipants(raw) {
  const arr = JSON.parse(raw)
  return arr.map(item => typeof item === 'string' ? { id: item } : item)
}

function participantIds(raw) {
  return parseParticipants(raw).map(p => p.id)
}

// --- Tab Switching ---
function switchTab(tab) {
  currentTab = tab
  const title = document.getElementById('sidebar-title')
  const actionBtn = document.getElementById('sidebar-action-btn')
  document.getElementById('tab-threads').className = tab === 'threads' ? TAB_ACTIVE : TAB_INACTIVE
  document.getElementById('tab-profiles').className = tab === 'profiles' ? TAB_ACTIVE : TAB_INACTIVE
  document.getElementById('thread-list').classList.toggle('hidden', tab !== 'threads')
  document.getElementById('profile-list').classList.toggle('hidden', tab !== 'profiles')
  if (tab === 'threads') {
    title.textContent = 'Agent IM'
    actionBtn.textContent = '+ New Thread'
    actionBtn.onclick = openNewThreadModal
    loadThreads()
  } else {
    title.textContent = 'Profiles'
    actionBtn.textContent = '+ Add Profile'
    actionBtn.onclick = () => openProfileModal()
    loadProfiles()
  }
}
window.switchTab = switchTab

// --- Threads ---
async function loadThreads() {
  try {
    const sender = document.getElementById('sender-input').value.trim() || 'user'
    const data = await api('GET', `/api/threads?profile_id=${encodeURIComponent(sender)}&include_closed=true&include_all=true`)
    cachedThreads = data.threads || []
    renderThreads(cachedThreads)
  } catch (e) { console.error('Failed to load threads:', e) }
}

function renderThreads(threads) {
  const list = document.getElementById('thread-list')
  if (!threads.length) { list.innerHTML = '<div class="p-4 text-center text-muted text-sm">No threads yet</div>'; return }
  list.innerHTML = threads.map(t => {
    const pIds = participantIds(t.participants)
    const isActive = t.id === currentThreadId
    const isClosed = t.status === 'closed'
    return `<div class="p-3 mx-2 my-1 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-border/50' : 'hover:bg-border/30'}" onclick="selectThread(${t.id})">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-medium truncate"><span class="text-xs text-muted font-mono mr-1.5">#${t.id}</span>${escapeHtml(t.topic)}</span>
        <span class="text-xs ${isClosed ? 'text-red-400' : 'text-accent'}">${t.status}</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xs text-muted font-mono truncate">${pIds.map(id => escapeHtml(displayName(id))).join(', ')}</span>
        <span class="text-xs text-muted">${t.message_count || 0} msgs</span>
      </div>
      <div class="text-xs text-muted mt-1">${timeAgo(t.last_message_at || t.created_at)}</div>
    </div>`
  }).join('')
}

// --- Profiles ---
async function loadProfiles() {
  try {
    const data = await api('GET', '/api/profiles')
    allProfiles = data.profiles || []
    renderProfiles(allProfiles)
  } catch (e) { console.error('Failed to load profiles:', e) }
}

function renderProfiles(profiles) {
  const list = document.getElementById('profile-list')
  if (!profiles.length) { list.innerHTML = '<div class="p-4 text-center text-muted text-sm">No profiles yet</div>'; return }
  list.innerHTML = profiles.map(p => {
    const color = senderColor(p.id)
    const roleClass = p.role === 'human' ? 'bg-blue-500/20 text-blue-400' : 'bg-accent/20 text-accent'
    const modelMatch = p.description && p.description.match(/^model:\s*(.+)$/)
    const modelBadge = modelMatch ? `<span class="text-xs px-1.5 py-0.5 rounded bg-purple-500/20 text-purple-400 ml-1">${escapeHtml(modelMatch[1])}</span>` : ''
    // Detect agent type icon
    const preset = AGENT_PRESETS.find(pr => p.id === pr.id || p.id.startsWith(pr.id + '-'))
    const icon = preset ? preset.icon : ''
    return `<div class="p-3 mx-2 my-1 rounded-lg cursor-pointer hover:bg-border/30 transition-colors" onclick="openProfileModal('${escapeHtml(p.id)}')">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-medium font-mono" style="color:${color}">${icon ? icon + ' ' : ''}${escapeHtml(p.id)}</span>
        <span class="text-xs px-1.5 py-0.5 rounded ${roleClass}">${p.role}</span>
      </div>
      ${p.display_name && p.display_name !== p.id ? `<div class="text-xs text-text-secondary">${escapeHtml(p.display_name)}${modelBadge}</div>` : (modelBadge ? `<div class="text-xs">${modelBadge}</div>` : '')}
      ${p.description && !modelMatch ? `<div class="text-xs text-muted mt-0.5 truncate">${escapeHtml(p.description)}</div>` : ''}
    </div>`
  }).join('')
}

// --- Agent Presets & Models ---
const AGENT_PRESETS = [
  { id: 'claude-code', name: 'Claude Code', icon: '🤖', color: '#d97706', models: [] },
  { id: 'codex', name: 'Codex (OpenAI)', icon: '🧠', color: '#10b981', models: [] },
  { id: 'gemini-cli', name: 'Gemini CLI', icon: '💎', color: '#3b82f6', models: [] },
  { id: 'custom-agent', name: 'Custom Agent', icon: '⚙️', color: '#6b7280', models: [] },
]

let selectedPreset = null
let detectedAgents = [] // fetched from /api/agents/local

async function fetchDetectedAgents() {
  try {
    const data = await api('GET', '/api/agents/local')
    detectedAgents = (data.agents || []).map(a => ({
      ...a,
      models: typeof a.models === 'string' ? JSON.parse(a.models) : a.models
    }))
  } catch { detectedAgents = [] }
}

function renderPresetList() {
  const container = document.getElementById('pm-preset-list')
  const existingIds = allProfiles.map(p => p.id)

  // Show detected local agents only (no fallback to hardcoded presets)
  const agentsToShow = detectedAgents.length > 0 ? detectedAgents : []

  let html = agentsToShow.map(agent => {
    const preset = AGENT_PRESETS.find(p => p.id === agent.id) || { icon: '🤖' }
    const variants = existingIds.filter(id => id === agent.id || id.startsWith(agent.id + '-'))
    const activeModel = (agent.models || []).find(m => m.active)
    const pathInfo = agent.exe_path || agent.config_dir || ''
    return `<button class="flex items-center gap-2 p-2.5 rounded-lg border border-accent/30 bg-accent/5 hover:border-accent/50 hover:bg-border/30 transition-all text-left group" onclick="selectPreset('${agent.id}')">
      <span class="text-lg">${preset.icon || '🤖'}</span>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">${agent.name} <span class="text-xs text-accent">● local</span></div>
        <div class="text-xs text-muted truncate" title="${escapeHtml(pathInfo)}">${pathInfo}</div>
        ${activeModel ? `<div class="text-xs text-purple-400 mt-0.5">active: ${escapeHtml(activeModel.value)}</div>` : ''}
      </div>
      ${variants.length ? `<span class="text-xs text-accent">${variants.length} added</span>` : ''}
    </button>`
  }).join('')

  if (!html) {
    html = '<div class="col-span-2 text-center text-muted text-xs py-3">No local agents detected.<br>Run <code class="bg-border/50 px-1 rounded">pnpm detect</code> to scan.</div>'
  }

  // Always add custom agent option
  html += `<button class="flex items-center gap-2 p-2.5 rounded-lg border border-border hover:border-accent/50 hover:bg-border/30 transition-all text-left" onclick="selectPreset('custom-agent')">
    <span class="text-lg">⚙️</span>
    <div class="flex-1 min-w-0">
      <div class="text-sm font-medium">Custom Agent</div>
      <div class="text-xs text-muted">manual config</div>
    </div>
  </button>`

  container.innerHTML = html
}

function selectPreset(presetId) {
  const preset = AGENT_PRESETS.find(p => p.id === presetId)
  const detected = detectedAgents.find(a => a.id === presetId)
  const agent = detected || preset
  if (!agent) return
  selectedPreset = { ...agent, models: agent.models || (preset ? preset.models : []) }
  if (typeof selectedPreset.models === 'string') selectedPreset.models = JSON.parse(selectedPreset.models)

  const idInput = document.getElementById('pm-id')
  const nameInput = document.getElementById('pm-display-name')
  const roleSelect = document.getElementById('pm-role')
  const modelSection = document.getElementById('pm-model-section')
  const modelSelect = document.getElementById('pm-model')

  if (presetId === 'custom-agent') {
    idInput.value = ''
    nameInput.value = ''
    idInput.readOnly = false
    idInput.classList.remove('opacity-50')
    modelSection.classList.add('hidden')
    return
  }

  roleSelect.value = 'agent'

  // Populate model dropdown
  if (selectedPreset.models && selectedPreset.models.length) {
    modelSelect.innerHTML = selectedPreset.models.map(m =>
      `<option value="${m.value}">${m.label}</option>`
    ).join('')
    modelSection.classList.remove('hidden')
    updatePresetId()
    modelSelect.onchange = updatePresetId
  } else {
    modelSection.classList.add('hidden')
    idInput.value = agent.id
    nameInput.value = agent.name
  }
  idInput.readOnly = false
  idInput.classList.remove('opacity-50')
}
window.selectPreset = selectPreset

function updatePresetId() {
  if (!selectedPreset || !selectedPreset.models.length) return
  const modelSelect = document.getElementById('pm-model')
  const selectedModel = modelSelect.value
  const modelInfo = selectedPreset.models.find(m => m.value === selectedModel)
  const modelLabel = modelInfo ? modelInfo.label : selectedModel

  // Generate unique ID: agent-id-modelname (e.g. claude-code-opus4)
  const modelSlug = modelLabel.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '')
  const profileId = `${selectedPreset.id}-${modelSlug}`

  document.getElementById('pm-id').value = profileId
  document.getElementById('pm-display-name').value = `${selectedPreset.name} (${modelLabel})`
  document.getElementById('pm-description').value = `model: ${selectedModel}`
}

// --- Profile Modal ---
function openProfileModal(editId) {
  const modal = document.getElementById('profile-modal')
  const idInput = document.getElementById('pm-id')
  const nameInput = document.getElementById('pm-display-name')
  const presetsSection = document.getElementById('pm-presets')
  const modelSection = document.getElementById('pm-model-section')
  selectedPreset = null
  modelSection.classList.add('hidden')
  if (editId) {
    presetsSection.classList.add('hidden')
    document.getElementById('pm-title').textContent = 'Edit Profile'
    const p = allProfiles.find(x => x.id === editId)
    if (!p) return
    idInput.value = p.id; idInput.readOnly = true; idInput.classList.add('opacity-50')
    nameInput.value = p.display_name || ''
    document.getElementById('pm-role').value = p.role || 'agent'
    document.getElementById('pm-description').value = p.description || ''
    document.getElementById('pm-persona').value = p.persona || ''
    // Show model section if description contains model info
    if (p.description && p.description.startsWith('model: ')) {
      const currentModel = p.description.replace('model: ', '')
      const matchingPreset = AGENT_PRESETS.find(pr => p.id.startsWith(pr.id))
      if (matchingPreset && matchingPreset.models.length) {
        selectedPreset = matchingPreset
        const modelSelect = document.getElementById('pm-model')
        modelSelect.innerHTML = matchingPreset.models.map(m =>
          `<option value="${m.value}" ${m.value === currentModel ? 'selected' : ''}>${m.label}</option>`
        ).join('')
        modelSection.classList.remove('hidden')
        modelSelect.onchange = updatePresetId
      }
    }
    // Show delete button
    document.getElementById('pm-delete').classList.remove('hidden')
    document.getElementById('pm-delete').onclick = async () => {
      if (!confirm(`Delete profile "${p.id}"?`)) return
      try {
        await api('DELETE', `/api/profiles/${encodeURIComponent(p.id)}`)
        document.getElementById('profile-modal').classList.add('hidden')
        await loadProfiles()
      } catch (e) { console.error('Failed to delete profile:', e) }
    }
  } else {
    presetsSection.classList.remove('hidden')
    document.getElementById('pm-title').textContent = 'Add Profile'
    idInput.value = ''; idInput.readOnly = false; idInput.classList.remove('opacity-50')
    nameInput.value = ''; document.getElementById('pm-role').value = 'agent'; document.getElementById('pm-description').value = ''; document.getElementById('pm-persona').value = ''
    document.getElementById('pm-delete').classList.add('hidden')
    // Fetch detected agents then render
    fetchDetectedAgents().then(() => renderPresetList())
  }
  modal.classList.remove('hidden')
  editId ? nameInput.focus() : idInput.focus()
}
window.openProfileModal = openProfileModal
document.getElementById('pm-cancel').onclick = () => document.getElementById('profile-modal').classList.add('hidden')
document.getElementById('pm-save').onclick = async () => {
  const id = document.getElementById('pm-id').value.trim()
  if (!id) return
  try {
    await api('POST', '/api/profiles', { id, display_name: document.getElementById('pm-display-name').value.trim() || id, role: document.getElementById('pm-role').value, description: document.getElementById('pm-description').value.trim() || null, persona: document.getElementById('pm-persona').value.trim() || null })
    document.getElementById('profile-modal').classList.add('hidden')
    await loadProfiles()
  } catch (e) { console.error('Failed to save profile:', e) }
}

// --- Detail Panel ---
function toggleDetailPanel() {
  detailPanelVisible = !detailPanelVisible
  document.getElementById('detail-panel').classList.toggle('hidden', !detailPanelVisible)
  document.getElementById('detail-backdrop').classList.toggle('hidden', !detailPanelVisible)
  if (detailPanelVisible) renderDetailPanel()
}
window.toggleDetailPanel = toggleDetailPanel

async function renderDetailPanel() {
  const thread = cachedThreads.find(t => t.id === currentThreadId)
  if (!thread) return
  document.getElementById('detail-topic').textContent = `#${thread.id} · ${thread.topic}`
  const descEl = document.getElementById('detail-description')
  if (thread.description) { descEl.textContent = thread.description; descEl.classList.remove('hidden') }
  else descEl.classList.add('hidden')
  const statusEl = document.getElementById('detail-status')
  statusEl.textContent = thread.status
  statusEl.className = `text-xs px-2 py-0.5 rounded-full border ${thread.status === 'open' ? 'border-accent text-accent' : 'border-red-400 text-red-400'}`
  document.getElementById('detail-created').textContent = timeAgo(thread.created_at)

  // Participants with roles + agent status
  const participants = parseParticipants(thread.participants)
  // Fetch agent statuses from proxy if thread has workspace
  let agentStatuses = {}
  if (thread.workspace) {
    try {
      const statusRes = await fetch(`${PROXY_BASE}/agents/status?thread_id=${thread.id}`)
      if (statusRes.ok) {
        const data = await statusRes.json()
        for (const a of (data.agents || [])) agentStatuses[a.agentId] = a.status
      }
    } catch { /* proxy not running */ }
  }
  document.getElementById('detail-participant-list').innerHTML = participants.map(p => {
    const color = senderColor(p.id)
    const isAgent = matchesKnownAgent(p.id)
    const agentStatus = agentStatuses[p.id]
    let statusBadge = ''
    if (isAgent) {
      if (agentStatus === 'running') {
        statusBadge = '<span class="inline-block w-2 h-2 rounded-full bg-green-400 mr-1" title="Running"></span>'
      } else if (agentStatus === 'pending') {
        statusBadge = '<span class="inline-block w-2 h-2 rounded-full bg-yellow-400 mr-1 animate-pulse" title="Starting..."></span>'
      } else {
        statusBadge = '<span class="inline-block w-2 h-2 rounded-full bg-gray-500 mr-1" title="Not running"></span>'
      }
    }
    return `<div class="flex items-center justify-between">
      <span class="text-sm font-mono" style="color:${color}">${statusBadge}${escapeHtml(displayName(p.id))}</span>
      ${p.role ? `<span class="text-xs px-1.5 py-0.5 rounded bg-border/50 text-text-secondary">${escapeHtml(p.role)}</span>` : ''}
    </div>`
  }).join('')
}

// --- Select thread ---
async function selectThread(id) {
  currentThreadId = id
  expandedMsgIds.clear()
  clearReply()
  window.location.hash = String(id)
  if (currentTab !== 'threads') switchTab('threads')
  if (window.innerWidth < 768) {
    document.getElementById('sidebar').classList.add('max-md:hidden')
    document.getElementById('message-panel').classList.remove('max-md:hidden')
    document.getElementById('back-btn').classList.remove('hidden')
  }
  document.getElementById('toggle-detail-btn').classList.remove('hidden')
  loadThreads()
  await loadMessages(true)
  if (detailPanelVisible) renderDetailPanel()

  pollingInterval = setInterval(pollUpdates, 3000)
}
window.selectThread = selectThread

document.getElementById('back-btn').onclick = () => {
  currentThreadId = null
  window.location.hash = ''
  if (pollingInterval) clearInterval(pollingInterval)
  if (detailPanelVisible) toggleDetailPanel()
  document.getElementById('sidebar').classList.remove('max-md:hidden')
  document.getElementById('message-panel').classList.add('max-md:hidden')

}

// --- Messages ---
async function loadMessages(forceScroll = false) {
  if (!currentThreadId) return
  const sender = document.getElementById('sender-input').value.trim() || 'user'
  try {
    const data = await api('GET', `/api/threads/${currentThreadId}/messages?reader=${encodeURIComponent(sender)}&limit=50`)
    cachedMessages = data.messages || []
    renderMessages(data, forceScroll)
    const thread = cachedThreads.find(t => t.id === currentThreadId)
    if (thread) {
      const pIds = participantIds(thread.participants)
      document.getElementById('msg-topic').textContent = `#${thread.id} · ${thread.topic}`
      document.getElementById('msg-participants').textContent = pIds.map(id => displayName(id)).join(', ')
      const badge = document.getElementById('msg-status-badge')
      badge.textContent = thread.status
      badge.className = `text-xs px-2 py-0.5 rounded-full border ${thread.status === 'open' ? 'border-accent text-accent' : 'border-red-400 text-red-400'}`
      badge.classList.remove('hidden')
      document.getElementById('close-thread-btn').classList.toggle('hidden', thread.status !== 'open')
      document.getElementById('reopen-thread-btn').classList.toggle('hidden', thread.status !== 'closed')
      document.getElementById('delete-thread-btn').classList.remove('hidden')
      document.getElementById('input-area').classList.toggle('hidden', thread.status !== 'open')
    }
  } catch (e) { console.error('Failed to load messages:', e) }
}

function renderMessages(data, forceScroll = false) {
  const container = document.getElementById('messages')
  const msgs = data.messages || []
  if (!msgs.length) { container.innerHTML = '<div class="text-center text-muted text-sm py-8">No messages yet</div>'; return }
  const shouldScroll = forceScroll || container.scrollTop + container.clientHeight >= container.scrollHeight - 50

  container.innerHTML = msgs.map(m => {
    const color = senderColor(m.sender)
    const readBy = JSON.parse(m.read_by)
    const isClosed = m.content.startsWith('[CLOSED]')

    // Reply reference
    let replyHtml = ''
    if (m.reply_to) {
      const ref = msgs.find(x => x.id === m.reply_to) || cachedMessages.find(x => x.id === m.reply_to)
      if (ref) {
        const refColor = senderColor(ref.sender)
        replyHtml = `<div class="mb-1 px-3 py-1.5 bg-border/20 rounded-t-lg border-l-2 cursor-pointer" style="border-color:${refColor}">
          <span class="text-xs font-mono font-medium" style="color:${refColor}">${escapeHtml(ref.sender)}</span>
          <div class="text-xs text-muted truncate">${escapeHtml(summarizeContent(ref.content, 80))}</div>
        </div>`
      }
    }

    return `<div class="flex flex-col ${isClosed ? 'items-center' : ''}">
      ${isClosed
        ? `<div class="bg-border/30 text-muted text-xs px-4 py-2 rounded-lg max-w-md text-center">
            <span class="font-medium" style="color:${color}">${escapeHtml(displayName(m.sender))}</span> closed the thread
            <div class="mt-1 text-text-secondary">${escapeHtml(m.content.replace('[CLOSED] ', ''))}</div>
          </div>`
        : `<div class="max-w-2xl group">
            <div class="flex items-baseline gap-2 mb-1">
              <span class="text-xs font-medium font-mono" style="color:${color}">${escapeHtml(displayName(m.sender))}</span>
              <span class="text-xs text-muted">${timeAgo(m.created_at)}</span>
              ${readBy.filter(r => r !== m.sender && matchesKnownAgent(r)).map(r => {
                const rc = senderColor(r)
                return `<span class="text-xs px-1 py-0.5 rounded bg-border/40" style="color:${rc}" title="${escapeHtml(r)} read">${escapeHtml(displayName(r))} ✓</span>`
              }).join(' ')}
              <div class="flex gap-1 ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                <button class="text-muted hover:text-accent" onclick="setReplyTo('${m.id}')" title="Reply">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
                </button>
                <button class="text-muted hover:text-red-400" onclick="confirmDeleteMsg('${m.id}')" title="Delete">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
              </div>
            </div>
            ${replyHtml}
            <div class="bg-panel border border-border ${m.reply_to ? 'rounded-b-lg rounded-tr-lg' : 'rounded-lg'} text-sm msg-card ${expandedMsgIds.has(m.id) ? 'expanded' : ''}" data-msg-id="${m.id}">
              <div class="msg-content px-3 py-2">${renderContent(m.content)}</div>
              <button class="msg-expand items-center justify-center w-full py-1 text-muted hover:text-text-secondary transition-colors" onclick="toggleMsg('${m.id}')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>`
      }
    </div>`
  }).join('')

  container.querySelectorAll('.msg-card').forEach(card => {
    if (card.classList.contains('expanded')) return
    const content = card.querySelector('.msg-content')
    if (content.scrollHeight <= content.clientHeight) card.classList.add('no-overflow')
  })
  if (shouldScroll) container.scrollTop = container.scrollHeight
}

function toggleMsg(id) {
  const card = document.querySelector(`.msg-card[data-msg-id="${id}"]`)
  if (!card) return
  card.classList.toggle('expanded')
  card.classList.contains('expanded') ? expandedMsgIds.add(id) : expandedMsgIds.delete(id)
}
window.toggleMsg = toggleMsg

window.clearReply = clearReply

window.confirmDeleteMsg = confirmDeleteMsg

// --- Send message ---
const KNOWN_AGENT_IDS = ['claude-code', 'codex', 'gemini-cli']
const PROXY_BASE = 'http://localhost:9000'

function sanitizeTopic(topic) {
  return topic.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '').substring(0, 50) || 'default'
}

async function getAppRoot() {
  try {
    const res = await fetch(`${PROXY_BASE}/app-root`)
    if (res.ok) { const data = await res.json(); return data.root }
  } catch {}
  return null
}

function matchesKnownAgent(profileId) {
  return KNOWN_AGENT_IDS.find(known => profileId === known || profileId.startsWith(known + '-'))
}

/** Parse @mentions from content, matching against participant IDs (fuzzy) */
function parseMentions(content, participantIds) {
  const mentions = []
  const re = /@([\w-]+)/g
  let m
  while ((m = re.exec(content)) !== null) {
    const mention = m[1]
    const found = participantIds.find(id => id === mention || id.startsWith(mention + '-') || mention.startsWith(id + '-'))
    if (found && !mentions.includes(found)) mentions.push(found)
  }
  return mentions
}

async function sendMessage() {
  const sender = document.getElementById('sender-input').value.trim()
  let content = document.getElementById('message-input').value.trim()
  // Append staged image as markdown
  if (stagedImageDataUri) {
    const imgMd = `![image](${stagedImageDataUri})`
    content = content ? `${content}\n${imgMd}` : imgMd
  }
  if (!sender || !content || !currentThreadId) return
  const body = { from: sender, content }
  if (replyToMsg) body.reply_to = replyToMsg.id
  try {
    await api('POST', `/api/threads/${currentThreadId}/messages`, body)
    document.getElementById('message-input').value = ''
    clearReply()
    clearStagedImage()
    await loadMessages()

    // Auto-invoke agent participants in PARALLEL via Node.js proxy
    const thread = cachedThreads.find(t => t.id === currentThreadId)
    if (thread && thread.workspace) {
      const participants = JSON.parse(thread.participants || '[]')
      const pIds = participants.map(p => typeof p === 'string' ? p : p.id)
      const agentParticipants = pIds.filter(id => matchesKnownAgent(id) && id !== sender)

      // Parse @mentions — if present, only invoke mentioned agents
      const mentions = parseMentions(content, pIds)
      const toInvoke = mentions.length > 0
        ? agentParticipants.filter(id => mentions.includes(id))
        : agentParticipants

      // Show thinking indicators and start status polling
      const messagesEl = document.getElementById('messages')
      const statusPollers = {}
      for (const agentId of toInvoke) {
        const thinkingEl = document.createElement('div')
        thinkingEl.id = `thinking-${agentId}`
        thinkingEl.className = 'flex items-center gap-2 px-4 py-2 text-sm text-muted'
        thinkingEl.innerHTML = `<span class="inline-block w-1.5 h-1.5 rounded-full bg-accent animate-ping"></span> <span class="thinking-text font-mono text-xs">${agentId}...</span>`
        messagesEl.appendChild(thinkingEl)

        // Poll real status from agent-server
        statusPollers[agentId] = setInterval(async () => {
          try {
            const r = await fetch(`${PROXY_BASE}/agents/${currentThreadId}/${agentId}/status`)
            if (!r.ok) return
            const s = await r.json()
            const textEl = thinkingEl.querySelector('.thinking-text')
            if (!textEl) return
            if (s.state === 'processing' && s.statusText) {
              textEl.textContent = `${agentId}: ${s.statusText}`
            }
          } catch {}
        }, 1500)
      }
      messagesEl.scrollTop = messagesEl.scrollHeight

      // Fire all agent invocations concurrently
      const invokePromises = toInvoke.map(async (agentId) => {
        try {
          const invokeRes = await fetch(`${PROXY_BASE}/invoke`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              thread_id: currentThreadId,
              agent_id: agentId,
              message: content,
              chain_depth: 0,
              participants: pIds,
            }),
          })
          if (!invokeRes.ok) {
            const err = await invokeRes.json().catch(() => ({}))
            console.warn(`Agent ${agentId} invoke failed:`, err.error || invokeRes.status)
          }
        } catch (e) { console.warn(`Agent ${agentId} invoke failed:`, e) }
        // Stop polling, refresh messages, THEN remove thinking indicator
        if (statusPollers[agentId]) clearInterval(statusPollers[agentId])
        await loadMessages()
        const el = document.getElementById(`thinking-${agentId}`)
        if (el) el.remove()
      })
      await Promise.all(invokePromises)
    }
  } catch (e) { console.error('Failed to send:', e) }
}
document.getElementById('send-btn').onclick = sendMessage
document.getElementById('message-input').onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey && document.getElementById('mention-dropdown').classList.contains('hidden')) { e.preventDefault(); sendMessage() } }

// --- Image Attach/Paste ---
let stagedImageDataUri = null
const MAX_IMAGE_SIZE = 512 * 1024 // 512KB base64 limit

function stageImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return
  const reader = new FileReader()
  reader.onload = () => {
    const dataUri = reader.result
    if (dataUri.length > MAX_IMAGE_SIZE) {
      alert(`Image too large (${(dataUri.length / 1024).toFixed(0)}KB). Max 512KB.`)
      return
    }
    stagedImageDataUri = dataUri
    document.getElementById('image-preview-thumb').src = dataUri
    document.getElementById('image-preview-name').textContent = file.name
    document.getElementById('image-preview-size').textContent = (file.size / 1024).toFixed(1) + ' KB'
    document.getElementById('image-preview-bar').classList.remove('hidden')
  }
  reader.readAsDataURL(file)
}

function clearStagedImage() {
  stagedImageDataUri = null
  document.getElementById('image-preview-bar').classList.add('hidden')
  document.getElementById('image-file-input').value = ''
}
window.clearStagedImage = clearStagedImage

document.getElementById('image-file-input').onchange = (e) => {
  const file = e.target.files[0]
  if (file) stageImageFile(file)
}

// Paste image from clipboard
document.getElementById('message-input').addEventListener('paste', (e) => {
  const items = e.clipboardData?.items
  if (!items) return
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault()
      stageImageFile(item.getAsFile())
      return
    }
  }
})

// --- @Mention Dropdown ---
;(function() {
  const msgInput = document.getElementById('message-input')
  const dropdown = document.getElementById('mention-dropdown')
  let mentionStart = -1 // cursor position where '@' was typed

  function getMentionParticipants() {
    if (!currentThreadId) return []
    const thread = cachedThreads.find(t => t.id === currentThreadId)
    if (!thread) return []
    const parts = JSON.parse(thread.participants || '[]')
    const sender = document.getElementById('sender-input').value.trim()
    return parts.map(p => typeof p === 'string' ? p : p.id).filter(id => id !== sender)
  }

  function showDropdown(filter) {
    const participants = getMentionParticipants()
    const filtered = filter
      ? participants.filter(id => id.toLowerCase().includes(filter.toLowerCase()))
      : participants
    if (filtered.length === 0) { hideDropdown(); return }
    dropdown.innerHTML = filtered.map((id, i) =>
      `<div class="px-3 py-2 text-sm text-text-primary hover:bg-bg cursor-pointer mention-item${i === 0 ? ' bg-bg' : ''}" data-id="${id}"><span class="text-accent">@</span>${escapeHtml(displayName(id))}<span class="text-xs text-muted ml-2">${escapeHtml(id)}</span></div>`
    ).join('')
    dropdown.classList.remove('hidden')
  }

  function hideDropdown() {
    dropdown.classList.add('hidden')
    mentionStart = -1
  }

  msgInput.addEventListener('input', () => {
    const val = msgInput.value
    const cursor = msgInput.selectionStart
    // Detect if we're in an @mention context
    const before = val.substring(0, cursor)
    const atIdx = before.lastIndexOf('@')
    if (atIdx >= 0 && (atIdx === 0 || before[atIdx - 1] === ' ')) {
      const partial = before.substring(atIdx + 1)
      if (!/\s/.test(partial)) {
        mentionStart = atIdx
        showDropdown(partial)
        return
      }
    }
    hideDropdown()
  })

  dropdown.addEventListener('click', (e) => {
    const item = e.target.closest('.mention-item')
    if (!item) return
    const id = item.dataset.id
    const val = msgInput.value
    const before = val.substring(0, mentionStart)
    const after = val.substring(msgInput.selectionStart)
    msgInput.value = before + '@' + id + ' ' + after
    msgInput.focus()
    const newPos = mentionStart + id.length + 2
    msgInput.setSelectionRange(newPos, newPos)
    hideDropdown()
  })

  msgInput.addEventListener('keydown', (e) => {
    if (dropdown.classList.contains('hidden')) return
    if (e.key === 'Escape') { e.preventDefault(); hideDropdown() }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault()
      const items = dropdown.querySelectorAll('.mention-item')
      if (items.length === 0) return
      const active = dropdown.querySelector('.mention-item.bg-bg')
      let idx = active ? Array.from(items).indexOf(active) : -1
      if (active) active.classList.remove('bg-bg')
      idx = e.key === 'ArrowDown' ? (idx + 1) % items.length : (idx - 1 + items.length) % items.length
      items[idx].classList.add('bg-bg')
      items[idx].scrollIntoView({ block: 'nearest' })
    }
    if (e.key === 'Enter' && !dropdown.classList.contains('hidden')) {
      const active = dropdown.querySelector('.mention-item.bg-bg') || dropdown.querySelector('.mention-item')
      if (active) { e.preventDefault(); active.click() }
    }
  })

  document.addEventListener('click', (e) => {
    if (!dropdown.contains(e.target) && e.target !== msgInput) hideDropdown()
  })
})()

// --- New Thread Modal ---
function openNewThreadModal() {
  selectedParticipants = []
  renderChips()
  document.getElementById('nt-topic').value = ''
  document.getElementById('nt-description').value = ''
  document.getElementById('nt-search').value = ''
  document.getElementById('new-thread-modal').classList.remove('hidden')
  document.getElementById('nt-topic').focus()
  api('GET', '/api/profiles').then(data => { allProfiles = data.profiles || []; renderParticipantDropdown('') }).catch(() => {})
}
document.getElementById('sidebar-action-btn').onclick = openNewThreadModal

function renderChips() {
  const container = document.getElementById('nt-chips')
  if (!selectedParticipants.length) { container.innerHTML = '<span class="text-xs text-muted">No participants selected</span>'; return }
  container.innerHTML = selectedParticipants.map((p, i) => {
    const color = senderColor(p.id)
    return `<span class="inline-flex items-center gap-1 bg-border/50 text-xs px-2 py-0.5 rounded-md font-mono" style="color:${color}">
      ${escapeHtml(displayName(p.id))}
      <input class="bg-transparent border-none outline-none text-text-secondary w-16 text-xs placeholder:text-muted/50" placeholder="role" value="${escapeHtml(p.role || '')}" onchange="updateParticipantRole(${i}, this.value)" onclick="event.stopPropagation()" />
      <span class="cursor-pointer opacity-60 hover:opacity-100" onclick="removeParticipant(${i})">&times;</span>
    </span>`
  }).join('')
}

function addParticipant(name) {
  name = name.trim()
  if (!name || selectedParticipants.some(p => p.id === name)) return
  selectedParticipants.push({ id: name, role: '' })
  renderChips()
  renderParticipantDropdown(document.getElementById('nt-search').value)
}
window.addParticipant = addParticipant

function removeParticipant(index) {
  selectedParticipants.splice(index, 1)
  renderChips()
  renderParticipantDropdown(document.getElementById('nt-search').value)
}
window.removeParticipant = removeParticipant

function updateParticipantRole(index, role) {
  if (selectedParticipants[index]) selectedParticipants[index].role = role.trim()
}
window.updateParticipantRole = updateParticipantRole

function renderParticipantDropdown(filter) {
  const dropdown = document.getElementById('nt-dropdown')
  const lower = filter.toLowerCase()
  const selectedIds = selectedParticipants.map(p => p.id)
  const filtered = allProfiles.filter(p => !selectedIds.includes(p.id) && (p.id.toLowerCase().includes(lower) || (p.display_name || '').toLowerCase().includes(lower)))
  if (!filtered.length && !filter) { dropdown.classList.add('hidden'); return }
  let html = filtered.map(p => {
    const roleClass = p.role === 'human' ? 'text-blue-400' : 'text-accent'
    return `<div class="px-3 py-2 hover:bg-border/30 cursor-pointer flex items-center justify-between" onclick="addParticipant('${escapeHtml(p.id)}')">
      <span class="text-sm font-mono">${escapeHtml(p.display_name || p.id)}</span>
      <span class="text-xs text-muted font-mono">${escapeHtml(p.id)}</span>
    </div>`
  }).join('')
  if (filter && !allProfiles.some(p => p.id === filter) && !selectedIds.includes(filter)) {
    html += `<div class="px-3 py-2 hover:bg-border/30 cursor-pointer border-t border-border flex items-center gap-2 text-accent" onclick="addParticipant('${escapeHtml(filter)}')">
      <span class="text-xs">+</span><span class="text-sm font-mono">${escapeHtml(filter)}</span><span class="text-xs text-muted">(new)</span>
    </div>`
  }
  if (!html) { dropdown.classList.add('hidden'); return }
  dropdown.innerHTML = html
  dropdown.classList.remove('hidden')
}

const ntSearch = document.getElementById('nt-search')
ntSearch.addEventListener('input', () => renderParticipantDropdown(ntSearch.value))
ntSearch.addEventListener('focus', () => renderParticipantDropdown(ntSearch.value))
ntSearch.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); const v = ntSearch.value.trim(); if (v) { addParticipant(v); ntSearch.value = ''; renderParticipantDropdown('') } } })
document.addEventListener('click', (e) => { if (!e.target.closest('#nt-search') && !e.target.closest('#nt-dropdown')) document.getElementById('nt-dropdown').classList.add('hidden') })

document.getElementById('nt-cancel').onclick = () => document.getElementById('new-thread-modal').classList.add('hidden')
document.getElementById('nt-create').onclick = async () => {
  const topic = document.getElementById('nt-topic').value.trim()
  if (!topic || !selectedParticipants.length) return
  const description = document.getElementById('nt-description').value.trim() || undefined
  const participants = selectedParticipants.map(p => p.role ? { id: p.id, role: p.role } : p.id)
  // Auto-generate workspace from topic
  const hasAgents = selectedParticipants.some(p => matchesKnownAgent(p.id))
  let workspace = undefined
  if (hasAgents) {
    const appRoot = await getAppRoot()
    if (appRoot) {
      const sep = appRoot.includes('\\') ? '\\' : '/'
      workspace = appRoot + sep + 'temp' + sep + sanitizeTopic(topic)
    }
  }
  try {
    const thread = await api('POST', '/api/threads', { topic, description, participants, workspace })
    document.getElementById('new-thread-modal').classList.add('hidden')
    // If workspace is set and there are agent participants, auto-launch them
    if (workspace) {
      const agentParticipants = selectedParticipants.filter(p => matchesKnownAgent(p.id))
      for (const agent of agentParticipants) {
        try {
          const baseAgentId = matchesKnownAgent(agent.id)
          await fetch(`/api/agents/launch`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ thread_id: thread.id, agent_id: agent.id, base_agent_id: baseAgentId, workspace })
          })
        } catch (e) { console.warn('Agent launch hint failed:', e) }
      }
    }
    await loadThreads()
    selectThread(thread.id)
  } catch (e) { console.error('Failed to create thread:', e) }
}

// --- Close Thread ---
document.getElementById('close-thread-btn').onclick = () => { document.getElementById('close-thread-modal').classList.remove('hidden'); document.getElementById('ct-reason').focus() }
document.getElementById('reopen-thread-btn').onclick = async () => {
  if (!currentThreadId) return
  const reopenedBy = document.getElementById('sender-input').value.trim() || 'user'
  try {
    await api('PUT', `/api/threads/${currentThreadId}`, { status: 'open', reopened_by: reopenedBy })
    // Re-launch agents for the reopened thread
    const thread = cachedThreads.find(t => t.id === currentThreadId)
    if (thread && thread.workspace) {
      const pIds = participantIds(thread.participants)
      for (const pid of pIds) {
        const base = matchesKnownAgent(pid)
        if (base) {
          try {
            await api('POST', '/api/agents/launch', { thread_id: currentThreadId, agent_id: pid, base_agent_id: base, workspace: thread.workspace })
          } catch { /* ignore */ }
        }
      }
    }
    await loadMessages()
    await loadThreads()
    if (detailPanelVisible) renderDetailPanel()
  } catch (e) { console.error('Failed to reopen thread:', e) }
}
document.getElementById('delete-thread-btn').onclick = async () => {
  if (!currentThreadId) return
  if (!confirm(`Delete thread #${currentThreadId} and all its messages? This cannot be undone.`)) return
  try {
    await api('DELETE', `/api/threads/${currentThreadId}`)
    currentThreadId = null
    window.location.hash = ''
    if (pollingInterval) clearInterval(pollingInterval)
    document.getElementById('messages').innerHTML = '<div class="text-center text-muted text-sm py-8">Select a thread</div>'
    document.getElementById('msg-topic').textContent = 'Select a thread'
    document.getElementById('msg-participants').textContent = ''
    document.getElementById('msg-status-badge').classList.add('hidden')
    document.getElementById('close-thread-btn').classList.add('hidden')
    document.getElementById('reopen-thread-btn').classList.add('hidden')
    document.getElementById('delete-thread-btn').classList.add('hidden')
    document.getElementById('input-area').classList.add('hidden')
    document.getElementById('toggle-detail-btn').classList.add('hidden')
    if (detailPanelVisible) toggleDetailPanel()
    await loadThreads()
  } catch (e) { console.error('Failed to delete thread:', e) }
}
document.getElementById('ct-cancel').onclick = () => document.getElementById('close-thread-modal').classList.add('hidden')
document.getElementById('ct-confirm').onclick = async () => {
  const reason = document.getElementById('ct-reason').value.trim()
  const closedBy = document.getElementById('sender-input').value.trim() || 'anon'
  try {
    await api('PUT', `/api/threads/${currentThreadId}`, { status: 'closed', reason, closed_by: closedBy })
    document.getElementById('close-thread-modal').classList.add('hidden')
    document.getElementById('ct-reason').value = ''
    await loadMessages()
    await loadThreads()
    if (detailPanelVisible) renderDetailPanel()
  } catch (e) { console.error('Failed to close thread:', e) }
}

// --- Polling ---
async function pollUpdates() { await Promise.all([loadThreads(), loadMessages()]) }

// --- Init ---
async function init() {
  const hash = window.location.hash.slice(1)
  await loadThreads()
  if (hash && /^\d+$/.test(hash)) {
    selectThread(parseInt(hash, 10))
  }
  api('GET', '/api/profiles').then(data => { allProfiles = data.profiles || [] }).catch(() => {})
}
init()
</script>
